<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">
      <img class="brand-logo" src="{{ "images/above-logo-black.webp" | relURL }}" alt="Above">
    </a>

    <nav class="main-nav" aria-label="Primary">
      <ul>
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>

    <a class="btn btn-small btn-primary header-cta" href="/#contact">Talk to Above</a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>

  <nav class="mobile-nav" aria-label="Mobile">
    <ul>
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL }}">{{ .Name }}</a></li>
      {{ end }}
      <li><a class="btn btn-primary" href="/#contact">Talk to Above</a></li>
    </ul>
  </nav>
</header>
